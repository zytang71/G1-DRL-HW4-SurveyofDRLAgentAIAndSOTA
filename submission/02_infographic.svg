<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <style>
      .bg { fill: #f5f3ee; }
      .frame { fill: #fffdf8; stroke: #d7d1c7; stroke-width: 2; }
      .title { font: 700 38px 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans CJK TC', sans-serif; fill: #13293d; }
      .subtitle { font: 400 17px 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans CJK TC', sans-serif; fill: #486581; }
      .section { font: 700 21px 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans CJK TC', sans-serif; fill: #13293d; }
      .label { font: 700 16px 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans CJK TC', sans-serif; fill: #13293d; }
      .text { font: 400 14px 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans CJK TC', sans-serif; fill: #243b53; }
      .small { font: 400 12px 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans CJK TC', sans-serif; fill: #52606d; }
      .tiny { font: 400 11px 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans CJK TC', sans-serif; fill: #52606d; }
      .card { rx: 22; ry: 22; stroke-width: 2; }
      .blue { fill: #dceeff; stroke: #4f7cac; }
      .orange { fill: #ffe8cc; stroke: #df8b34; }
      .green { fill: #e1f3e5; stroke: #4f8f63; }
      .red { fill: #fde2e0; stroke: #cc5a4f; }
      .gray { fill: #eef2f4; stroke: #8a99a8; }
      .white { fill: #ffffff; stroke: #d8e1e8; }
      .arrow { stroke: #355070; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #7b8794; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355070"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1200"/>
  <rect class="frame" x="42" y="38" width="1516" height="1122" rx="30" ry="30"/>

  <text class="title" x="82" y="92">程式碼維運代理</text>
  <text class="subtitle" x="82" y="123">Code Operations Agent：LLM 作為控制器，透過工具呼叫、記憶與 workflow orchestration 支援 CI 排查與錯誤診斷</text>

  <text class="section" x="82" y="180">1. 核心架構</text>
  <rect class="card white" x="72" y="205" width="1450" height="360"/>

  <rect class="card gray" x="110" y="340" width="180" height="68"/>
  <text class="label" x="149" y="382">使用者請求</text>

  <rect class="card blue" x="358" y="323" width="220" height="102"/>
  <text class="label" x="415" y="365">LLM 控制器</text>
  <text class="small" x="402" y="389">分類 / 規劃 / 決策</text>

  <rect class="card blue" x="650" y="323" width="250" height="102"/>
  <text class="label" x="712" y="365">狀態機協調器</text>
  <text class="small" x="692" y="389">workflow control / branching</text>

  <rect class="card orange" x="980" y="248" width="240" height="66"/>
  <text class="label" x="1026" y="288">工具 A：Issue / PR</text>
  <text class="small" x="1050" y="308">抓取 context</text>

  <rect class="card orange" x="980" y="332" width="240" height="66"/>
  <text class="label" x="1032" y="372">工具 B：CI Log</text>
  <text class="small" x="1020" y="392">failure signature</text>

  <rect class="card orange" x="980" y="416" width="240" height="66"/>
  <text class="label" x="1004" y="456">工具 C：Code Search</text>
  <text class="small" x="1000" y="476">定位程式碼 / patch direction</text>

  <rect class="card green" x="1290" y="270" width="190" height="88"/>
  <text class="label" x="1342" y="307">短期記憶</text>
  <text class="small" x="1313" y="330">incident state / confidence</text>
  <text class="small" x="1324" y="349">已執行工具 / 待解問題</text>

  <rect class="card green" x="1290" y="384" width="190" height="88"/>
  <text class="label" x="1342" y="421">長期記憶</text>
  <text class="small" x="1310" y="444">已知修復 / 重複失敗模式</text>
  <text class="small" x="1335" y="463">服務別維修經驗</text>

  <rect class="card gray" x="1310" y="500" width="170" height="42"/>
  <text class="label" x="1340" y="528">最終回應</text>

  <line class="arrow" x1="290" y1="374" x2="358" y2="374"/>
  <line class="arrow" x1="578" y1="374" x2="650" y2="374"/>
  <line class="arrow" x1="900" y1="374" x2="980" y2="281"/>
  <line class="arrow" x1="900" y1="374" x2="980" y2="365"/>
  <line class="arrow" x1="900" y1="374" x2="980" y2="449"/>
  <line class="soft" x1="1220" y1="281" x2="1290" y2="314"/>
  <line class="soft" x1="1220" y1="449" x2="1290" y2="428"/>
  <line class="soft" x1="1385" y1="472" x2="1395" y2="500"/>

  <text class="small" x="84" y="530">LLM 是控制器，tools 提供外部證據，memory 保存 incident context；state machine 負責約束流程。</text>

  <text class="section" x="82" y="620">2. Function Calling 與 Workflow</text>
  <rect class="card white" x="72" y="645" width="1450" height="270"/>

  <rect class="card blue" x="110" y="720" width="128" height="62"/>
  <text class="label" x="142" y="758">接收請求</text>
  <text class="tiny" x="126" y="776">incident / CI 描述</text>

  <rect class="card blue" x="275" y="720" width="128" height="62"/>
  <text class="label" x="307" y="758">分類任務</text>
  <text class="tiny" x="312" y="776">task type</text>

  <rect class="card blue" x="440" y="720" width="128" height="62"/>
  <text class="label" x="474" y="758">建立計畫</text>
  <text class="tiny" x="474" y="776">tool plan</text>

  <rect class="card orange" x="605" y="720" width="128" height="62"/>
  <text class="label" x="644" y="758">工具 A</text>
  <text class="tiny" x="630" y="776">issue / PR context</text>

  <rect class="card orange" x="770" y="720" width="128" height="62"/>
  <text class="label" x="809" y="758">工具 B</text>
  <text class="tiny" x="792" y="776">failure signature</text>

  <rect class="card orange" x="935" y="720" width="128" height="62"/>
  <text class="label" x="974" y="758">工具 C</text>
  <text class="tiny" x="962" y="776">code / patch</text>

  <rect class="card blue" x="1100" y="720" width="142" height="62"/>
  <text class="label" x="1129" y="758">證據整合</text>
  <text class="tiny" x="1143" y="776">merge evidence</text>

  <rect class="card gray" x="1279" y="720" width="146" height="62"/>
  <text class="label" x="1315" y="758">最終回應</text>
  <text class="tiny" x="1302" y="776">診斷 / 風險 / next step</text>

  <line class="arrow" x1="238" y1="751" x2="275" y2="751"/>
  <line class="arrow" x1="403" y1="751" x2="440" y2="751"/>
  <line class="arrow" x1="568" y1="751" x2="605" y2="751"/>
  <line class="arrow" x1="733" y1="751" x2="770" y2="751"/>
  <line class="arrow" x1="898" y1="751" x2="935" y2="751"/>
  <line class="arrow" x1="1063" y1="751" x2="1100" y2="751"/>
  <line class="arrow" x1="1242" y1="751" x2="1279" y2="751"/>

  <rect class="card red" x="115" y="825" width="620" height="54"/>
  <text class="label" x="138" y="857">工具呼叫限制</text>
  <text class="small" x="138" y="876">schema validation、一次受控重試、預設 read-only</text>

  <rect class="card red" x="780" y="815" width="215" height="36"/>
  <text class="tiny" x="795" y="838">flaky test → 穩定性分支</text>

  <rect class="card red" x="1010" y="815" width="225" height="36"/>
  <text class="tiny" x="1024" y="838">compile error → 修補規劃分支</text>

  <rect class="card red" x="1250" y="815" width="210" height="36"/>
  <text class="tiny" x="1262" y="838">衝突證據 → human review</text>

  <text class="section" x="82" y="970">3. Memory / Safety / Evaluation</text>
  <rect class="card white" x="72" y="995" width="1450" height="125"/>

  <rect class="card green" x="100" y="1018" width="260" height="80"/>
  <text class="label" x="183" y="1049">短期記憶</text>
  <text class="small" x="120" y="1074">incident ID / 目前假設 / confidence</text>

  <rect class="card green" x="390" y="1018" width="260" height="80"/>
  <text class="label" x="473" y="1049">長期記憶</text>
  <text class="small" x="412" y="1074">已知修復 / 重複失敗模式 / 維修經驗</text>

  <rect class="card red" x="680" y="1018" width="280" height="80"/>
  <text class="label" x="775" y="1049">安全限制</text>
  <text class="small" x="700" y="1074">read-only / no auto-merge / no auto-deploy / human approval</text>

  <rect class="card gray" x="990" y="1018" width="500" height="80"/>
  <text class="label" x="1200" y="1049">Evaluation</text>
  <text class="small" x="1014" y="1074">30 historical maintenance incidents / task completion rate / tool-call accuracy / root-cause precision@1 / Baseline: LLM-only assistant</text>
</svg>
